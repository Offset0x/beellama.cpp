name: Windows CUDA 13.1 Build

on:
  push:
    branches:
      - 'gemma-4-31b' # Listening specifically to your branch
  workflow_dispatch: # Gives you a manual "Run workflow" button in the Actions tab

jobs:
  build-cuda:
    runs-on: windows-2022
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install CUDA Toolkit 13.1
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '13.1.0' # Forces the cloud machine to install CUDA 13.1

      - name: Build with CMake (CUDA + CPU EXEs)
        run: |
          # Added -DGGML_CUDA=ON to trigger the CUDA build
          cmake -B build -DGGML_CUDA=ON -DLLAMA_BUILD_BORINGSSL=ON -DGGML_SCHED_NO_REALLOC=ON
          cmake --build build --config Release -j ${env:NUMBER_OF_PROCESSORS}
          
      - name: Upload Binaries (EXEs and DLLs)
        uses: actions/upload-artifact@v4
        with:
          name: beellama-windows-cuda-13.1
          # By using the * wildcard, it grabs main.exe, server.exe, AND ggml-cuda.dll
          path: build/bin/Release/*
